{% extends 'base.html' %}
{% block title %}{{ title }} | SneakerHub{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="market-card p-4">
            <h4 class="mb-4">{{ title }}</h4>
            <form method="post" enctype="multipart/form-data" class="vstack gap-3">
                {% csrf_token %}
                {% for field in form %}
                <div>
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2">
                    <button class="btn btn-market rounded-pill">Lưu sản phẩm</button>
                    <a href="{% url 'seller:products' %}" class="btn btn-outline-secondary rounded-pill">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
